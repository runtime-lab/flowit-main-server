name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  gradle-check:
    name: Gradle Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Security PR Gate
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          vulnerability-check: true
          license-check: true

      - name: Run checks
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]' }}
        run: ./gradlew --no-daemon check

      - name: Run lightweight checks for Dependabot
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' }}
        run: >
          ./gradlew --no-daemon
          compileJava
          compileTestJava
          test
          --tests 'dev.runtime_lab.flowit.architecture.*'
          --tests 'dev.runtime_lab.flowit.domain.*'
          --tests 'dev.runtime_lab.flowit.global.*'
