services:
  mysql:
    image: mysql:8.4
    container_name: flowit-local-mysql
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_flowitlocal
      TZ: Asia/Seoul
    volumes:
      - flowit_local_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_flowitlocal"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: flowit-local-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - flowit_local_redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - flowitLocalDev
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "flowitLocalDev", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  flowit_local_mysql_data:
  flowit_local_redis_data:
