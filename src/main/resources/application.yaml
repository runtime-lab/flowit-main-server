spring:
  application:
    name: flowit

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:project_flowit}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true
    username: ${MYSQL_USERNAME:flowit_dev}
    password: ${MYSQL_PASSWORD:flowitDevPass}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  sql:
    init:
      mode: never

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:flowitLocalDev}
      timeout: 3s

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

server:
  port: ${SERVER_PORT:8080}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
    address: ${MANAGEMENT_SERVER_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never

flowit:
  security:
    cors:
      allowed-origins: ${FLOWIT_CORS_ALLOWED_ORIGINS:http://localhost:3000}
      allowed-methods: ${FLOWIT_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${FLOWIT_CORS_ALLOWED_HEADERS:*}
      exposed-headers: ${FLOWIT_CORS_EXPOSED_HEADERS:Location}
      allow-credentials: ${FLOWIT_CORS_ALLOW_CREDENTIALS:true}
      max-age: ${FLOWIT_CORS_MAX_AGE:1h}
    jwt:
      issuer: ${FLOWIT_JWT_ISSUER:flowit-main-server}
      access-token-time-to-live: ${FLOWIT_JWT_ACCESS_TOKEN_TIME_TO_LIVE:15m}
      refresh-token-time-to-live: ${FLOWIT_JWT_REFRESH_TOKEN_TIME_TO_LIVE:14d}
      refresh-token-cookie-name: ${FLOWIT_JWT_REFRESH_TOKEN_COOKIE_NAME:flowit_refresh_token}
      refresh-token-cookie-path: ${FLOWIT_JWT_REFRESH_TOKEN_COOKIE_PATH:/v1/public/auth}
      refresh-token-cookie-same-site: ${FLOWIT_JWT_REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
      refresh-token-cookie-secure: ${FLOWIT_JWT_REFRESH_TOKEN_COOKIE_SECURE:false}
      # Local development defaults. Override key settings in deployed environments.
      private-key-location: ${FLOWIT_JWT_PRIVATE_KEY_LOCATION:classpath:jwt/local-dev-private.pem}
      public-key-location: ${FLOWIT_JWT_PUBLIC_KEY_LOCATION:classpath:jwt/local-dev-public.pem}
      private-key: ${FLOWIT_JWT_PRIVATE_KEY:}
      public-key: ${FLOWIT_JWT_PUBLIC_KEY:}
