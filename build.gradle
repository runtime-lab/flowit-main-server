import org.asciidoctor.gradle.jvm.AsciidoctorTask
import org.gradle.api.artifacts.Dependency
import org.gradle.api.artifacts.ExternalModuleDependency
import org.gradle.api.artifacts.component.ModuleComponentIdentifier
import org.gradle.api.attributes.Category
import org.gradle.api.attributes.DocsType

plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'org.asciidoctor.jvm.convert' version '4.0.5'
}

group = 'dev.runtime-lab'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
	}
}

repositories {
	mavenCentral()
}

ext {
	set('snippetsDir', file("build/generated-snippets"))
	set('querydslVersion', '5.1.0')
}

def apiDocsStaticDir = layout.buildDirectory.dir('resources/main/static/docs')
def composeFile = layout.projectDirectory.file('compose.yaml')
def composeLinuxFile = layout.projectDirectory.file('compose.linux.yaml')
def localAppImage = 'flowit-main-server:local'
def localAppImageSourceHashLabel = 'dev.runtime-lab.flowit.source-hash'
def localSourceHashPaths = [
	'src/main',
	'src/docs',
	'src/test/java/dev/runtime_lab/flowit/docs',
	'src/test/resources/org/springframework/restdocs',
	'build.gradle',
	'settings.gradle',
	'gradle',
	'Dockerfile',
	'.dockerignore'
]
def localInfrastructureServices = ['mysql', 'redis', 'prometheus', 'grafana']
def localStackServices = ['app'] + localInfrastructureServices
def localAppHealthUrl = 'http://127.0.0.1:8081/actuator/health'
def osName = System.getProperty('os.name').toLowerCase()
def isLinux = osName.contains('linux')

def isTruthy = { String value ->
	value != null && ['true', '1', 'yes', 'y', 'on'].contains(value.trim().toLowerCase())
}

def isProductionValue = { String value ->
	value != null && ['prod', 'production'].contains(value.trim().toLowerCase())
}

def hasProductionProfile = { String value ->
	value != null && value.split(/[,\s;]+/).any { isProductionValue(it) }
}

def localDockerBlockSignals = {
	def env = System.getenv()
	def signals = []
	if (isTruthy(env['CI'])) {
		signals += 'CI'
	}
	if (isTruthy(env['GITHUB_ACTIONS'])) {
		signals += 'GITHUB_ACTIONS'
	}
	if (isTruthy(env['GITLAB_CI'])) {
		signals += 'GITLAB_CI'
	}
	if (env['JENKINS_URL']) {
		signals += 'JENKINS_URL'
	}
	if (env['KUBERNETES_SERVICE_HOST']) {
		signals += 'KUBERNETES_SERVICE_HOST'
	}
	if (isProductionValue(env['FLOWIT_ENV'])) {
		signals += "FLOWIT_ENV=${env['FLOWIT_ENV']}"
	}
	if (hasProductionProfile(env['SPRING_PROFILES_ACTIVE'])) {
		signals += "SPRING_PROFILES_ACTIVE=${env['SPRING_PROFILES_ACTIVE']}"
	}
	if (hasProductionProfile(env['SPRING_PROFILES_INCLUDE'])) {
		signals += "SPRING_PROFILES_INCLUDE=${env['SPRING_PROFILES_INCLUDE']}"
	}
	signals
}

def assertLocalDockerAllowed = { String taskName ->
	def signals = localDockerBlockSignals()
	if (!signals.isEmpty()) {
		throw new GradleException("Refusing to run ${taskName}: local Docker tasks are for client/API local development only and are blocked in production or CI environments. Signal(s): ${signals.join(', ')}")
	}
	if (isLinux && !isTruthy(System.getenv('FLOWIT_ALLOW_LOCAL_DOCKER'))) {
		throw new GradleException("Refusing to run ${taskName} on Linux without FLOWIT_ALLOW_LOCAL_DOCKER=true. This keeps local Docker tasks out of server environments.")
	}
}

def dockerComposeCommand = { List<String> args ->
	def command = ['docker', 'compose', '-f', composeFile.asFile.absolutePath]
	if (isLinux) {
		command += ['-f', composeLinuxFile.asFile.absolutePath]
	}
	command + args
}

def sha256Hex = { byte[] bytes ->
	def digest = java.security.MessageDigest.getInstance('SHA-256').digest(bytes)
	digest.collect { String.format('%02x', it & 0xff) }.join()
}

def relativeProjectPath = { File file ->
	projectDir.toPath().relativize(file.toPath()).toString().replace('\\', '/')
}

def localSourceFiles = {
	def sourceFiles = []
	localSourceHashPaths.each { relativePath ->
		def path = layout.projectDirectory.file(relativePath).asFile
		if (path.isDirectory()) {
			path.eachFileRecurse { file ->
				if (file.isFile()) {
					sourceFiles += file
				}
			}
		}
		else if (path.isFile()) {
			sourceFiles += path
		}
	}
	sourceFiles.sort { relativeProjectPath(it) }
}

def localSourceHash = {
	def entries = localSourceFiles().collect { file ->
		"${relativeProjectPath(file)}\n${sha256Hex(file.bytes)}"
	}.join('\n')
	sha256Hex(entries.getBytes('UTF-8'))
}

def dockerBuildCommand = { String sourceHash ->
	[
		'docker',
		'build',
		'--progress=plain',
		'--label',
		"${localAppImageSourceHashLabel}=${sourceHash}",
		'-t',
		localAppImage,
		'-f',
		layout.projectDirectory.file('Dockerfile').asFile.absolutePath,
		projectDir.absolutePath
	]
}

def runCommand = { List<String> command, boolean ignoreExit = false ->
	try {
		def process = new ProcessBuilder(command)
			.directory(projectDir)
			.inheritIO()
			.start()
		def exitValue = process.waitFor()
		if (exitValue != 0 && !ignoreExit) {
			throw new GradleException("Command failed with exit code ${exitValue}: ${command.join(' ')}")
		}
		exitValue
	}
	catch (Exception ex) {
		if (!ignoreExit) {
			throw new GradleException("Command failed: ${command.join(' ')}", ex)
		}
		logger.lifecycle("Command unavailable: ${command.join(' ')}")
		127
	}
}

def runLoggedCommand = { List<String> command ->
	try {
		def process = new ProcessBuilder(command)
			.directory(projectDir)
			.redirectErrorStream(true)
			.start()

		process.inputStream.withReader { reader ->
			String line
			while ((line = reader.readLine()) != null) {
				logger.lifecycle(line)
			}
		}

		def exitValue = process.waitFor()
		if (exitValue != 0) {
			throw new GradleException("Command failed with exit code ${exitValue}: ${command.join(' ')}")
		}
		exitValue
	}
	catch (Exception ex) {
		if (ex instanceof GradleException) {
			throw ex
		}
		throw new GradleException("Command failed: ${command.join(' ')}", ex)
	}
}

def captureCommand = { List<String> command ->
	try {
		def output = new ByteArrayOutputStream()
		def process = new ProcessBuilder(command)
			.directory(projectDir)
			.redirectErrorStream(true)
			.start()
		process.inputStream.withStream { it.transferTo(output) }
		def exitValue = process.waitFor()
		[exitValue: exitValue, output: output.toString()]
	}
	catch (Exception ex) {
		[exitValue: 127, output: ex.message]
	}
}

def healthStatus = { String healthUrl ->
	try {
		def connection = new URI(healthUrl).toURL().openConnection()
		connection.connectTimeout = 1000
		connection.readTimeout = 1000
		connection.requestMethod = 'GET'
		return "HTTP ${connection.responseCode}"
	}
	catch (Exception ignored) {
		return 'unavailable'
	}
}

def waitForHealth = { String healthUrl, int timeoutSeconds ->
	def deadline = System.currentTimeMillis() + (timeoutSeconds * 1000L)
	while (System.currentTimeMillis() < deadline) {
		if (healthStatus(healthUrl) == 'HTTP 200') {
			return true
		}
		Thread.sleep(1000)
	}
	false
}

def runningComposeServices = {
	def result = captureCommand(dockerComposeCommand(['ps', '--services', '--status', 'running']))
	if (result.exitValue != 0) {
		return []
	}
	result.output.readLines()
		.collect { it.trim() }
		.findAll { !it.isEmpty() }
}

def localAppImageExists = {
	captureCommand(['docker', 'image', 'inspect', localAppImage]).exitValue == 0
}

def localAppImageSourceHash = {
	def template = "{{ index .Config.Labels \"${localAppImageSourceHashLabel}\" }}"
	def result = captureCommand(['docker', 'image', 'inspect', '--format', template, localAppImage])
	if (result.exitValue != 0) {
		return null
	}

	def value = result.output.readLines()
		.collect { it.trim() }
		.find { !it.isEmpty() }
	if (!value || value == '<no value>') {
		return null
	}
	value
}

def buildLocalAppImage = { String sourceHash ->
	logger.lifecycle("Building Docker image: ${localAppImage}")
	logger.lifecycle('Docker build progress will be printed below. The first build can take a few minutes.')
	runLoggedCommand(dockerBuildCommand(sourceHash))
}

