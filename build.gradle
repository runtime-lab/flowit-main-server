tasks.register('archiveIntegrationNote') {
	description = 'Archives the current updates/latest.adoc into a versioned Integration Note file.'
	group = 'documentation'

	doLast {
		def latestFile = integrationNoteLatestFile.asFile
		if (!latestFile.isFile()) {
			throw new GradleException("Integration Note latest file does not exist: ${latestFile}")
		}

		def latestContent = latestFile.getText('UTF-8').trim()
		if (latestContent.isEmpty()) {
			throw new GradleException('Integration Note latest file is blank.')
		}

		def version = integrationNoteVersion()
		def safeVersion = integrationNoteSafeName(version)
		def timestamp = integrationNoteTimestamp()
		def humanTime = integrationNoteHumanTime(timestamp)
		def slug = integrationNoteSafeName((project.findProperty('integrationNoteSlug') ?: 'integration-note').toString())
		def impact = (project.findProperty('integrationNoteImpact') ?: 'Changed').toString().trim()
		def target = (project.findProperty('integrationNoteTarget') ?: '`updates/latest.adoc`').toString().trim()
		def summary = (project.findProperty('integrationNoteSummary') ?: slug.replace('-', ' ')).toString().trim()
		def sourceHash = sha256Hex(latestContent.getBytes('UTF-8'))
		def notesRoot = integrationNoteNotesDir.dir(safeVersion).asFile

		if (isEmptyIntegrationNote(latestContent) && !project.hasProperty('archiveEmptyIntegrationNote')) {
			logger.lifecycle('Integration Note latest is Empty; skipping archive. Use -ParchiveEmptyIntegrationNote=true to force it.')
			refreshIntegrationArchiveIndex()
			return
		}

		def archivedByAnyVersion = findArchivedIntegrationNoteByHash(sourceHash)
		if (archivedByAnyVersion != null) {
			logger.lifecycle("Integration Note already archived: ${archivedByAnyVersion}")
			refreshIntegrationArchiveIndex()
			return
		}

		notesRoot.mkdirs()

		def alreadyArchived = notesRoot.listFiles()
			.findAll { it.isFile() && it.name.endsWith('.adoc') }
			.find { it.getText('UTF-8').contains("// integration-note-source-sha256: ${sourceHash}") }

		if (alreadyArchived != null) {
			logger.lifecycle("Integration Note already archived: ${alreadyArchived}")
			refreshIntegrationArchiveIndex()
			return
		}

		def baseName = "${timestamp}-${slug}"
		def noteFile = new File(notesRoot, "${baseName}.adoc")
		int duplicateIndex = 2
		while (noteFile.exists()) {
			noteFile = new File(notesRoot, "${baseName}-${duplicateIndex}.adoc")
			duplicateIndex++
		}

		def anchor = "integration-note-${integrationNoteAnchor("${safeVersion}-${noteFile.name.replaceFirst(/\.adoc$/, '')}")}"
		def archivedContent = """// integration-note-source-sha256: ${sourceHash}
// integration-note-version: ${version}
// integration-note-time: ${timestamp}
// integration-note-time-human: ${humanTime}
// integration-note-impact: ${impact}
// integration-note-target: ${target}
// integration-note-summary: ${summary}
// integration-note-anchor: ${anchor}

[#${anchor}]
=== ${summary}

[cols=\"1,4\",role=\"endpoint-summary\"]
|===
|Version |`${version}`
|Archived At |${humanTime}
|Impact |${impact}
|Target |${target}
|Source |`updates/latest.adoc`
|===

.Archived integration note
[.archived-note-snapshot]
--
${latestContent}
--
"""

		noteFile.setText(archivedContent, 'UTF-8')
		refreshIntegrationArchiveIndex()
		logger.lifecycle("Integration Note archived: ${noteFile}")
	}
}

tasks.named('asciidoctor', AsciidoctorTask) {
	inputs.dir snippetsDir
	dependsOn restdocsTest
	baseDirFollowsSourceFile()
	doFirst {
		delete layout.buildDirectory.dir('docs/asciidoc')
	}
	attributes 'snippets': snippetsDir,
		'api-version': apiDocsVersion(),
		'api-version-stage': integrationNoteStage(apiDocsVersion()),
		'api-version-stage-status': integrationNoteStageStatus(apiDocsVersion()),
		'revnumber': apiDocsVersion()
	resources {
		from(apiDocsSourceDir) {
			include 'css/**'
		}
	}
}

tasks.register('copyApiDocs', Copy) {
	description = 'Copies generated API documentation into Spring Boot static resources.'
	group = 'documentation'
	dependsOn asciidoctor
	from layout.buildDirectory.dir('docs/asciidoc')
	into apiDocsStaticDir
	doFirst {
		delete apiDocsStaticDir
	}
}

