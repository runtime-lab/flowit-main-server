def isLinux = osName.contains('linux')

def isTruthy = { String value ->
	value != null && ['true', '1', 'yes', 'y', 'on'].contains(value.trim().toLowerCase())
}

def isProductionValue = { String value ->
	value != null && ['prod', 'production'].contains(value.trim().toLowerCase())
}

def hasProductionProfile = { String value ->
	value != null && value.split(/[,\s;]+/).any { isProductionValue(it) }
}

def localDockerBlockSignals = {
	def env = System.getenv()
	def signals = []
	if (isTruthy(env['CI'])) {
		signals += 'CI'
	}
	if (isTruthy(env['GITHUB_ACTIONS'])) {
		signals += 'GITHUB_ACTIONS'
	}
	if (isTruthy(env['GITLAB_CI'])) {
		signals += 'GITLAB_CI'
	}
	if (env['JENKINS_URL']) {
		signals += 'JENKINS_URL'
	}
	if (env['KUBERNETES_SERVICE_HOST']) {
		signals += 'KUBERNETES_SERVICE_HOST'
	}
	if (isProductionValue(env['FLOWIT_ENV'])) {
		signals += "FLOWIT_ENV=${env['FLOWIT_ENV']}"
	}
	if (hasProductionProfile(env['SPRING_PROFILES_ACTIVE'])) {
		signals += "SPRING_PROFILES_ACTIVE=${env['SPRING_PROFILES_ACTIVE']}"
	}
	if (hasProductionProfile(env['SPRING_PROFILES_INCLUDE'])) {
		signals += "SPRING_PROFILES_INCLUDE=${env['SPRING_PROFILES_INCLUDE']}"
	}
	signals
}

def assertLocalDockerAllowed = { String taskName ->
	def signals = localDockerBlockSignals()
	if (!signals.isEmpty()) {
		throw new GradleException("Refusing to run ${taskName}: local Docker tasks are for client/API local development only and are blocked in production or CI environments. Signal(s): ${signals.join(', ')}")
	}
	if (isLinux && !isTruthy(System.getenv('FLOWIT_ALLOW_LOCAL_DOCKER'))) {
		throw new GradleException("Refusing to run ${taskName} on Linux without FLOWIT_ALLOW_LOCAL_DOCKER=true. This keeps local Docker tasks out of server environments.")
	}
}

def dockerComposeCommand = { List<String> args ->
	def command = ['docker', 'compose', '-f', composeFile.asFile.absolutePath]
	if (isLinux) {
		command += ['-f', composeLinuxFile.asFile.absolutePath]
	}
	command + args
}

def sha256Hex = { byte[] bytes ->
	def digest = java.security.MessageDigest.getInstance('SHA-256').digest(bytes)
	digest.collect { String.format('%02x', it & 0xff) }.join()
}

def apiDocsVersion = {
	def value = providers.gradleProperty('apiDocsVersion')
		.orElse(providers.provider {
			project.ext.has('apiDocsVersion') ? project.ext.get('apiDocsVersion').toString() : project.version.toString()
		})
		.get()
		.trim()
	if (value.isEmpty()) {
		throw new GradleException('API docs version must not be blank.')
	}
	value
}

def integrationNoteVersion = {
	(project.findProperty('integrationNoteVersion') ?: apiDocsVersion()).toString().trim()
}

def integrationNoteSafeName = { String value ->
	def safe = value.trim().replaceAll(/[^A-Za-z0-9._-]+/, '-')
	if (safe.isEmpty()) {
		throw new GradleException('Integration note version or slug must not be blank.')
	}
	safe
}

def integrationNoteAnchor = { String value ->
	value.toLowerCase(java.util.Locale.ROOT)
		.replaceAll(/[^a-z0-9]+/, '-')
		.replaceAll(/^-+|-+$/, '')
}

def integrationNoteHtmlEscape = { String value ->
	(value ?: '')
		.replace('&', '&amp;')
		.replace('<', '&lt;')
		.replace('>', '&gt;')
		.replace('"', '&quot;')
		.replace("'", '&#39;')
}

def integrationNoteDisplayVersion = { String value ->
	value.split(/[-_]/)
		.findAll { !it.isBlank() }
		.collect { part -> part.equalsIgnoreCase('chamber') ? 'Chamber' : part }
		.join(' ')
}

def integrationNoteVersionParts = { String version ->
	def matcher = version =~ /^(\d+)\.(\d+)\.(\d+)(?:[-_].*)?$/
	if (!matcher.matches()) {
		throw new GradleException("Integration note version must start with major.minor.patch: ${version}")
	}
	[
		major: matcher[0][1] as int,
		minor: matcher[0][2] as int,
		patch: matcher[0][3] as int
	]
}

def compareIntegrationVersionsDesc = { String left, String right ->
	def leftParts = integrationNoteVersionParts(left)
	def rightParts = integrationNoteVersionParts(right)
	int comparison = rightParts.major <=> leftParts.major
	if (comparison != 0) {
		return comparison
	}
	comparison = rightParts.minor <=> leftParts.minor
	if (comparison != 0) {
		return comparison
	}
	comparison = rightParts.patch <=> leftParts.patch
	if (comparison != 0) {
		return comparison
	}
	return right <=> left
}

def integrationNoteSortVersionsDesc = { Collection<String> source ->
	def sorted = new ArrayList<String>(source ?: [])
	sorted.sort(compareIntegrationVersionsDesc)
	sorted
}

def integrationNoteSeriesKey = { String version ->
	def parts = integrationNoteVersionParts(version)
	"${parts.major}.${parts.minor}"
}

def integrationNoteDisplaySeries = { String series ->
	"${series}.x"
}

def integrationNoteSeriesPageName = { String series ->
	"integration-notes-${integrationNoteSafeName(series)}.adoc"
}

def integrationNoteSeriesHtmlName = { String series ->
	"integration-notes-${integrationNoteSafeName(series)}.html"
}

def integrationNoteStage = { String version ->
	def matcher = version =~ /^\d+\.\d+\.\d+[-_]([A-Za-z0-9._-]+)$/
	if (!matcher.matches()) {
		return 'Release'
	}
	matcher[0][1]
		.split(/[._-]+/)
		.findAll { !it.isBlank() }
		.collect { it.equalsIgnoreCase('chamber') ? 'Chamber' : it.capitalize() }
		.join(' ')
}

def integrationNoteStageKey = { String version ->
	def matcher = version =~ /^\d+\.\d+\.\d+[-_]([A-Za-z0-9._-]+)$/
	if (!matcher.matches()) {
		return 'release'
	}
	matcher[0][1]
		.split(/[._-]+/)
		.findAll { !it.isBlank() }
		.first()
		.toLowerCase(java.util.Locale.ROOT)
}

def integrationNoteStageStatus = { String version ->
	switch (integrationNoteStageKey(version)) {
		case 'chamber':
			return '이 API들은 불완전 상태로 구현 과정에서 응답이 변경 될 수 있는 상태입니다.'
		case 'volt':
			return '개발 지원 체계가 성립된 고속 확장 구간입니다. 급격한 API 변동이 예고됩니다.'
		case 'neon':
			return '완전 안정화 및 상용화 개시 가능 단계입니다. Stable 계약에 대해 엄격한 Semantic Versioning을 적용합니다.'
		default:
			return '현재 stage 정책은 Version Policy를 참고합니다.'
	}
}

def integrationNoteTimestamp = {
	def override = project.findProperty('integrationNoteTimestamp')?.toString()?.trim()
	if (override) {
		return override
	}

	java.time.LocalDateTime.now(java.time.ZoneId.of('Asia/Seoul'))
		.format(java.time.format.DateTimeFormatter.ofPattern('yyyy-MM-dd-HHmm'))
}

def integrationNoteHumanTime = { String timestamp ->
	try {
		def parsed = java.time.LocalDateTime.parse(
			timestamp,
			java.time.format.DateTimeFormatter.ofPattern('yyyy-MM-dd-HHmm')
		)
		return parsed.format(java.time.format.DateTimeFormatter.ofPattern('yyyy-MM-dd HH:mm')) + ' KST'
	}
	catch (Exception ignored) {
		return timestamp
	}
}

def integrationNoteMetadata = { File file ->
	def metadata = [
		file: file,
		summary: file.name.replaceFirst(/\.adoc$/, ''),
		time: '',
		'time-human': '',
		impact: 'Changed',
		target: '`updates/latest.adoc`',
		anchor: ''
	]

	file.readLines('UTF-8').take(20).each { line ->
		def matcher = line =~ /^\/\/ integration-note-([A-Za-z0-9-]+):\s*(.*)$/
		if (matcher.matches()) {
			metadata[matcher[0][1]] = matcher[0][2]
		}
	}

	metadata
}

def integrationNoteVersionNoteCount = { String version ->
	def safeVersion = integrationNoteSafeName(version)
	def versionNotesRoot = integrationNoteNotesDir.dir(safeVersion).asFile
	versionNotesRoot.exists()
		? versionNotesRoot.listFiles().count { it.isFile() && it.name.endsWith('.adoc') }
		: 0
}

def integrationNoteVersions = {
	def versions = [] as LinkedHashSet
	def notesRoot = integrationNoteNotesDir.asFile
	if (notesRoot.exists()) {
		notesRoot.listFiles()
			.findAll { it.isDirectory() && integrationNoteVersionNoteCount(it.name) > 0 }
			.collect { it.name }
			.each { versions.add(it) }
	}

	integrationNoteSortVersionsDesc(versions)
}

def findArchivedIntegrationNoteByHash = { String sourceHash ->
	def notesRoot = integrationNoteNotesDir.asFile
	if (!notesRoot.exists()) {
		return null
	}

	notesRoot.listFiles()
		.findAll { it.isDirectory() }
		.collectMany { versionDir ->
			versionDir.listFiles()
				.findAll { it.isFile() && it.name.endsWith('.adoc') }
		}
		.find { it.getText('UTF-8').contains("// integration-note-source-sha256: ${sourceHash}") }
}

def isEmptyIntegrationNote = { String latestContent ->
	latestContent.readLines().any { it ==~ /^\s*Empty::.*$/ }
}

def deleteGeneratedIntegrationNoteFiles = {
	def deleteMatching = { File root, Closure<Boolean> predicate ->
		if (!root.exists()) {
			return
		}
		root.listFiles()
			.findAll { it.isFile() && predicate(it) }
			.each { file ->
				if (!file.delete()) {
					throw new GradleException("Failed to delete generated Integration Note file: ${file}")
				}
			}
	}

	deleteMatching(integrationNoteVersionsDir.asFile) { it.name.startsWith('_') && it.name.endsWith('.adoc') }
	deleteMatching(integrationNoteSeriesDir.asFile) { it.name.startsWith('_') && it.name.endsWith('.adoc') }
	deleteMatching(apiDocsAsciidocDir.asFile) { it.name ==~ /^integration-notes-\d+\.\d+\.adoc$/ }
}

def refreshIntegrationVersionPage = { String version ->
	def safeVersion = integrationNoteSafeName(version)
	def notesRoot = integrationNoteNotesDir.dir(safeVersion).asFile
	def versionFile = integrationNoteVersionsDir.file("_${safeVersion}.adoc").asFile
	versionFile.parentFile.mkdirs()

	def notes = []
	if (notesRoot.exists()) {
		notes = notesRoot.listFiles()
			.findAll { it.isFile() && it.name.endsWith('.adoc') }
			.collect { integrationNoteMetadata(it) }
			.sort { left, right -> (right.time ?: '') <=> (left.time ?: '') }
	}

	def builder = new StringBuilder()
	def displayVersion = integrationNoteDisplayVersion(version)
	def noteCount = notes.size()
	def noteLabel = noteCount == 1 ? '1 note' : "${noteCount} notes"
	builder.append("[[integration-notes-${integrationNoteAnchor(safeVersion)}]]\n")
	builder.append('++++\n')
	builder.append('<details class="integration-note-version">\n')
	builder.append('<summary><span class="integration-note-version-summary">')
	builder.append("<span class=\"integration-note-version-title\">${integrationNoteHtmlEscape(displayVersion)}</span>")
	builder.append("<span class=\"integration-note-version-meta\">${integrationNoteHtmlEscape(integrationNoteStage(version))} / ${noteLabel}</span>")
	builder.append('</span></summary>\n')
	builder.append('<div class="content">\n')
	builder.append('++++\n\n')

	if (notes.isEmpty()) {
		builder.append('아직 이관된 Integration Note가 없습니다.\n')
	}
	else {
		builder.append('[cols="18,16,24,42",options="header",role="api-index"]\n')
		builder.append('|===\n')
		builder.append('|Time |Impact |Target |Summary\n\n')
		notes.each { note ->
			builder.append("|${note['time-human'] ?: note.time}\n")
			builder.append("|${note.impact}\n")
			builder.append("|${note.target}\n")
			builder.append("|<<${note.anchor},${note.summary}>>\n\n")
		}
		builder.append('|===\n\n')
		notes.each { note ->
			builder.append("include::../notes/${safeVersion}/${note.file.name}[]\n\n")
		}
	}
	builder.append('++++\n')
	builder.append('</div>\n')
	builder.append('</details>\n')
	builder.append('++++\n')

	versionFile.setText(builder.toString(), 'UTF-8')
}

def refreshIntegrationSeriesPage = { String series, List<String> versions ->
	def safeSeries = integrationNoteSafeName(series)
	def seriesFile = integrationNoteSeriesDir.file("_${safeSeries}.adoc").asFile
	seriesFile.parentFile.mkdirs()

	def sortedVersions = integrationNoteSortVersionsDesc(versions)
	def builder = new StringBuilder()
	builder.append("[#integration-notes-series-${integrationNoteAnchor(series)}]\n")
	builder.append("== ${integrationNoteDisplaySeries(series)} Integration Notes\n\n")
	builder.append('[cols="24,18,18,40",options="header",role="api-index"]\n')
	builder.append('|===\n')
	builder.append('|Version |Stage |Notes |Description\n\n')
	sortedVersions.each { version ->
		builder.append("|<<integration-notes-${integrationNoteAnchor(version)},`${version}`>>\n")
		builder.append("|${integrationNoteStage(version)}\n")
		builder.append("|${integrationNoteVersionNoteCount(version)}\n")
		builder.append("|${integrationNoteDisplayVersion(version)} 기록입니다.\n\n")
	}
	builder.append('|===\n\n')
	sortedVersions.each { version ->
		builder.append("include::../versions/_${version}.adoc[]\n\n")
	}

	seriesFile.setText(builder.toString(), 'UTF-8')

	def pageFile = apiDocsAsciidocDir.file(integrationNoteSeriesPageName(series)).asFile
	pageFile.setText("""= Integration Notes - ${integrationNoteDisplaySeries(series)}
:doctype: book
:sectanchors:
:sectlinks:
:version-label: 버전
:source-language: http
:stylesheet: restdocs-modern.css
:stylesdir: css
:linkcss:
:nav-integration-notes:
:breadcrumb-section: Integration Notes
:breadcrumb-current: ${integrationNoteDisplaySeries(series)}

include::_navigation.adoc[]

include::_breadcrumb.adoc[]

include::updates/series/_${safeSeries}.adoc[]
""", 'UTF-8')
}

def refreshIntegrationArchiveIndex = {
	deleteGeneratedIntegrationNoteFiles()

	def versions = integrationNoteVersions()
	versions.each { refreshIntegrationVersionPage(it) }
	def versionsBySeries = versions.groupBy { integrationNoteSeriesKey(it) }
	def sortedSeries = versionsBySeries.keySet().toList()
	sortedSeries.sort { left, right ->
		def leftParts = left.split(/\./).collect { it as int }
		def rightParts = right.split(/\./).collect { it as int }
		int comparison = rightParts[0] <=> leftParts[0]
		if (comparison != 0) {
			return comparison
		}
		return rightParts[1] <=> leftParts[1]
	}
	sortedSeries.each { series -> refreshIntegrationSeriesPage(series, versionsBySeries.get(series)) }

	def builder = new StringBuilder()
	builder.append('[cols="20,22,16,16,26",options="header",role="api-index"]\n')
	builder.append('|===\n')
	builder.append('|Series |Latest Version |Versions |Notes |Link\n\n')
	sortedSeries.each { series ->
		def seriesVersions = integrationNoteSortVersionsDesc(versionsBySeries.get(series))
		def latestVersion = seriesVersions.first()
		def noteCount = seriesVersions.sum { integrationNoteVersionNoteCount(it) }
		builder.append("|${integrationNoteDisplaySeries(series)}\n")
		builder.append("|`${latestVersion}`\n")
		builder.append("|${seriesVersions.size()}\n")
		builder.append("|${noteCount}\n")
		def seriesLinkText = integrationNoteHtmlEscape("${integrationNoteDisplaySeries(series)} Integration Notes")
		builder.append("|pass:[<a href=\"${integrationNoteSeriesHtmlName(series)}\">${seriesLinkText}</a>]\n\n")
	}
	builder.append('|===\n')

	def indexFile = integrationNoteArchiveIndexFile.asFile
	indexFile.parentFile.mkdirs()
	indexFile.setText(builder.toString(), 'UTF-8')
}

def relativeProjectPath = { File file ->
	projectDir.toPath().relativize(file.toPath()).toString().replace('\\', '/')
}

def localSourceFiles = {
	def sourceFiles = []
	localSourceHashPaths.each { relativePath ->
		def path = layout.projectDirectory.file(relativePath).asFile
		if (path.isDirectory()) {
			path.eachFileRecurse { file ->
				if (file.isFile()) {
					sourceFiles += file
				}
			}
		}
		else if (path.isFile()) {
			sourceFiles += path
		}
	}
	sourceFiles.sort { relativeProjectPath(it) }
}

def localSourceHash = {
	def entries = localSourceFiles().collect { file ->
		"${relativeProjectPath(file)}\n${sha256Hex(file.bytes)}"
	}.join('\n')
	sha256Hex(entries.getBytes('UTF-8'))
}

def dockerBuildCommand = { String sourceHash ->
	[
		'docker',
		'build',
		'--progress=plain',
		'--label',
		"${localAppImageSourceHashLabel}=${sourceHash}",
		'-t',
		localAppImage,
		'-f',
		layout.projectDirectory.file('Dockerfile').asFile.absolutePath,
		projectDir.absolutePath
	]
}

def runCommand = { List<String> command, boolean ignoreExit = false ->
	try {
		def process = new ProcessBuilder(command)
			.directory(projectDir)
			.inheritIO()
			.start()
		def exitValue = process.waitFor()
		if (exitValue != 0 && !ignoreExit) {
			throw new GradleException("Command failed with exit code ${exitValue}: ${command.join(' ')}")
		}
		exitValue
	}
	catch (Exception ex) {
		if (!ignoreExit) {
			throw new GradleException("Command failed: ${command.join(' ')}", ex)
		}
		logger.lifecycle("Command unavailable: ${command.join(' ')}")
		127
	}
}

def runLoggedCommand = { List<String> command ->
	try {
		def process = new ProcessBuilder(command)
			.directory(projectDir)
			.redirectErrorStream(true)
			.start()

		process.inputStream.withReader { reader ->
			String line
			while ((line = reader.readLine()) != null) {
				logger.lifecycle(line)
			}
		}

		def exitValue = process.waitFor()
		if (exitValue != 0) {
			throw new GradleException("Command failed with exit code ${exitValue}: ${command.join(' ')}")
		}
		exitValue
	}
	catch (Exception ex) {
		if (ex instanceof GradleException) {
			throw ex
		}
		throw new GradleException("Command failed: ${command.join(' ')}", ex)
	}
}

def captureCommand = { List<String> command ->
	try {
		def output = new ByteArrayOutputStream()
		def process = new ProcessBuilder(command)
			.directory(projectDir)
			.redirectErrorStream(true)
			.start()
		process.inputStream.withStream { it.transferTo(output) }
		def exitValue = process.waitFor()
		[exitValue: exitValue, output: output.toString()]
	}
	catch (Exception ex) {
		[exitValue: 127, output: ex.message]
	}
}

def healthStatus = { String healthUrl ->
	try {
		def connection = new URI(healthUrl).toURL().openConnection()
		connection.connectTimeout = 1000
		connection.readTimeout = 1000
		connection.requestMethod = 'GET'
		return "HTTP ${connection.responseCode}"
	}
	catch (Exception ignored) {
		return 'unavailable'
	}
}

def waitForHealth = { String healthUrl, int timeoutSeconds ->
	def deadline = System.currentTimeMillis() + (timeoutSeconds * 1000L)
	while (System.currentTimeMillis() < deadline) {
		if (healthStatus(healthUrl) == 'HTTP 200') {
			return true
		}
		Thread.sleep(1000)
	}
	false
}

def runningComposeServices = {
	def result = captureCommand(dockerComposeCommand(['ps', '--services', '--status', 'running']))
	if (result.exitValue != 0) {
		return []
	}
	result.output.readLines()
		.collect { it.trim() }
		.findAll { !it.isEmpty() }
}

def localAppImageExists = {
	captureCommand(['docker', 'image', 'inspect', localAppImage]).exitValue == 0
}

def localAppImageSourceHash = {
	def template = "{{ index .Config.Labels \"${localAppImageSourceHashLabel}\" }}"
	def result = captureCommand(['docker', 'image', 'inspect', '--format', template, localAppImage])
	if (result.exitValue != 0) {
		return null
	}

	def value = result.output.readLines()
		.collect { it.trim() }
		.find { !it.isEmpty() }
	if (!value || value == '<no value>') {
		return null
	}
	value
}

def buildLocalAppImage = { String sourceHash ->
	logger.lifecycle("Building Docker image: ${localAppImage}")
	logger.lifecycle('Docker build progress will be printed below. The first build can take a few minutes.')
	runLoggedCommand(dockerBuildCommand(sourceHash))
}

