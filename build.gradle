tasks.register('resolveDependencySources') {
	group = 'verification'
	description = 'Resolves dependency source JARs, including classified sources, so Gradle dependency verification metadata can include them.'

	doLast {
		def configurationsToResolve = []
		configurationsToResolve.addAll(configurations.findAll { it.canBeResolved })

		def buildscriptClasspath = buildscript.configurations.findByName('classpath')
		if (buildscriptClasspath != null && buildscriptClasspath.canBeResolved) {
			configurationsToResolve.add(buildscriptClasspath)
		}

		def resolvedSourceFiles = [] as Set
		def standardSourceDependencyCoordinates = [] as Set
		def classifiedSourceDependencyCoordinates = [] as Set

		configurations.each { configuration ->
			configuration.dependencies.withType(ExternalModuleDependency).each { dependency ->
				dependency.artifacts.findAll { it.classifier }.each { artifact ->
					classifiedSourceDependencyCoordinates.add("${dependency.group}:${dependency.name}:${dependency.version}:sources-${artifact.classifier}")
				}
			}
		}

		configurationsToResolve.unique { it.name }.each { configuration ->
			configuration.incoming.resolutionResult.allComponents.each { component ->
				def componentId = component.id
				if (componentId instanceof ModuleComponentIdentifier) {
					standardSourceDependencyCoordinates.add("${componentId.group}:${componentId.module}:${componentId.version}:sources")
				}
			}

			def sourceArtifacts = configuration.incoming.artifactView {
				withVariantReselection()
				lenient(true)
				componentFilter { componentId ->
					componentId instanceof ModuleComponentIdentifier
				}
				attributes {
					attribute(
						Category.CATEGORY_ATTRIBUTE,
						objects.named(Category, Category.DOCUMENTATION)
					)
					attribute(
						DocsType.DOCS_TYPE_ATTRIBUTE,
						objects.named(DocsType, DocsType.SOURCES)
					)
				}
			}.files.files

			resolvedSourceFiles.addAll(sourceArtifacts)
		}

		def additionalSourceDependencies = (standardSourceDependencyCoordinates + classifiedSourceDependencyCoordinates)
			.collect { dependencies.create(it) }

		if (!additionalSourceDependencies.isEmpty()) {
			additionalSourceDependencies.collate(100).each { dependencyBatch ->
				def additionalSourceDependencyArray = dependencyBatch.toArray(new Dependency[0])
				def additionalSourcesConfiguration = configurations.detachedConfiguration(*additionalSourceDependencyArray)
				additionalSourcesConfiguration.transitive = false
				resolvedSourceFiles.addAll(additionalSourcesConfiguration.incoming.artifactView {
					lenient(true)
				}.files.files)
			}
		}

		logger.lifecycle("Resolved ${resolvedSourceFiles.size()} dependency source artifact(s).")
		resolvedSourceFiles.sort { it.name }.each {
			logger.info("Resolved dependency source artifact: ${it.name}")
		}
	}
}

tasks.named('test') {
	dependsOn 'copyApiDocs'
	useJUnitPlatform()
}

tasks.register('localInfraStart') {
	group = 'local'
	description = 'Starts the local Docker Compose infrastructure.'

	doLast {
		assertLocalDockerAllowed('localInfraStart')
		def exitValue = runCommand(dockerComposeCommand(['up', '-d', '--wait'] + localInfrastructureServices), true)
		if (exitValue != 0) {
			logger.lifecycle('Docker Compose did not accept or complete --wait. Falling back to: docker compose up -d')
			runCommand(dockerComposeCommand(['up', '-d'] + localInfrastructureServices))
		}
	}
}

tasks.register('localInfraStop') {
	group = 'local'
	description = 'Stops only the local Docker Compose infrastructure services while preserving volumes.'

	doLast {
		assertLocalDockerAllowed('localInfraStop')
		def exitValue = runCommand(dockerComposeCommand(['stop'] + localInfrastructureServices), true)
		if (exitValue != 0) {
			logger.lifecycle('Docker Compose stop did not complete. Check whether Docker is installed and running.')
		}
	}
}

tasks.register('localBuildImage') {
	group = 'local'
	description = 'Builds the local Spring Boot Docker image with plain progress output.'

	doLast {
		assertLocalDockerAllowed('localBuildImage')
		buildLocalAppImage(localSourceHash())
	}
}

tasks.register('localStart') {
	group = 'local'
	description = 'Builds and starts the full local Docker Compose stack.'

	doLast {
		assertLocalDockerAllowed('localStart')
		logger.lifecycle('Checking local source hash...')
		def sourceHash = localSourceHash()
		def imageExists = localAppImageExists()
		def imageSourceHash = imageExists ? localAppImageSourceHash() : null
		def imageUpToDate = imageSourceHash == sourceHash
		def runningServices = runningComposeServices()
		if (imageUpToDate && runningServices.containsAll(localStackServices) && healthStatus(localAppHealthUrl) == 'HTTP 200') {
			logger.lifecycle('Source hash unchanged; reusing image.')
			logger.lifecycle('Flowit local Docker Compose stack is already running.')
			logger.lifecycle('Application: http://127.0.0.1:8080')
			logger.lifecycle("Health: ${localAppHealthUrl} (HTTP 200)")
			logger.lifecycle('Logs: docker compose logs -f app')
			return
		}

		if (imageUpToDate) {
			logger.lifecycle('Source hash unchanged; reusing image.')
			logger.lifecycle("Using existing Docker image: ${localAppImage}")
			logger.lifecycle('Run ./gradlew localBuildImage when you need to rebuild the application image from source.')
		}
		else if (imageExists) {
			if (imageSourceHash == null) {
				logger.lifecycle("Docker image source hash is missing; rebuilding Docker image: ${localAppImage}")
			}
			else {
				logger.lifecycle('Source hash changed; rebuilding image.')
				logger.lifecycle("Rebuilding Docker image: ${localAppImage}")
			}
			buildLocalAppImage(sourceHash)
		}
		else {
			logger.lifecycle("Docker image not found: ${localAppImage}")
			buildLocalAppImage(sourceHash)
		}

		runCommand(dockerComposeCommand(['up', '-d']))

		logger.lifecycle('Flowit local Docker Compose stack start requested.')
		logger.lifecycle('Application: http://127.0.0.1:8080')
		logger.lifecycle('Waiting up to 90 seconds for application health...')
		if (waitForHealth(localAppHealthUrl, 90)) {
			logger.lifecycle("Health: ${localAppHealthUrl} (HTTP 200)")
		}
		else {
			logger.lifecycle("Health endpoint is not ready yet: ${localAppHealthUrl} (${healthStatus(localAppHealthUrl)})")
		}
		logger.lifecycle('Logs: docker compose logs -f app')
	}
}

tasks.register('localStop') {
	group = 'local'
	description = 'Stops the local Docker Compose application and infrastructure while preserving volumes.'

	doLast {
		assertLocalDockerAllowed('localStop')
		def exitValue = runCommand(dockerComposeCommand(['down']), true)
		if (exitValue != 0) {
			logger.lifecycle('Docker Compose down did not complete. Check whether Docker is installed and running.')
		}
	}
}

tasks.register('localStatus') {
	group = 'local'
	description = 'Shows local application and Docker Compose infrastructure status.'

	doLast {
		assertLocalDockerAllowed('localStatus')
		logger.lifecycle("Application health: ${healthStatus(localAppHealthUrl)}")
		logger.lifecycle('Application logs: docker compose logs -f app')
		logger.lifecycle('')
		logger.lifecycle('Docker Compose services:')

		def exitValue = runCommand(dockerComposeCommand(['ps']), true)
		if (exitValue != 0) {
			logger.lifecycle('Docker Compose status is unavailable. Check whether Docker is installed and running.')
		}
	}
}

tasks.register('restdocsTest', Test) {
	description = 'Runs tests that generate Spring REST Docs snippets.'
	group = 'documentation'
	testClassesDirs = sourceSets.test.output.classesDirs
	classpath = sourceSets.test.runtimeClasspath
	outputs.dir snippetsDir
	useJUnitPlatform()
	filter {
		includeTestsMatching 'dev.runtime_lab.flowit.docs.*'
	}
}

tasks.named('asciidoctor', AsciidoctorTask) {
	inputs.dir snippetsDir
	dependsOn restdocsTest
	doFirst {
		delete layout.buildDirectory.dir('docs/asciidoc')
	}
	attributes 'snippets': snippetsDir
	resources {
		from('src/docs/asciidoc') {
			include 'css/**'
		}
	}
}

tasks.register('copyApiDocs', Copy) {
	description = 'Copies generated API documentation into Spring Boot static resources.'
	group = 'documentation'
	dependsOn asciidoctor
	from layout.buildDirectory.dir('docs/asciidoc')
	into apiDocsStaticDir
	doFirst {
		delete apiDocsStaticDir
	}
}

tasks.named('resolveMainClassName') {
	dependsOn copyApiDocs
}

tasks.named('jar') {
	dependsOn copyApiDocs
}

tasks.named('bootJar') {
	dependsOn copyApiDocs
}

tasks.named('bootRun') {
	dependsOn copyApiDocs
}
